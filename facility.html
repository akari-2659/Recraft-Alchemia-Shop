<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>リクラフト・アルケミア 施設カタログ v90.8.201</title>
<style>
:root{--bg:#f6efe2;--paper:#fffaf0;--ink:#2f251c;--muted:#766757;--line:#d9c5a8;--accent:#98612f;--green:#58765f;--danger:#a54d43;--shadow:0 14px 36px rgba(78,50,22,.13)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:system-ui,-apple-system,"Yu Gothic","Hiragino Sans",sans-serif;color:var(--ink);background:radial-gradient(circle at 10% 0,#ffe8bf 0,transparent 28rem),linear-gradient(180deg,#fff9ee,var(--bg));min-height:100svh}
header,main{width:min(1120px,calc(100% - 24px));margin:auto}header{padding:22px 0 8px}.hero,.panel{background:rgba(255,250,240,.94);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}.hero{padding:20px}.build{font-size:12px;color:var(--muted);margin-bottom:6px}h1{font-size:clamp(24px,4vw,38px);margin:0 0 7px}.subtitle{margin:0;color:var(--muted);line-height:1.7}.panel{padding:16px;margin:14px 0}.unlock-grid{display:grid;grid-template-columns:minmax(220px,1fr) auto auto;gap:8px;align-items:end}.field label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin:0 0 5px}input{width:100%;border:1px solid var(--line);border-radius:12px;background:#fffdf8;padding:10px 12px;font:inherit;color:var(--ink)}button{border:0;border-radius:999px;padding:10px 14px;font:inherit;font-weight:800;color:white;background:var(--accent);cursor:pointer;white-space:normal}button.secondary{background:var(--green)}button.ghost{background:#f2e5d2;color:var(--ink);border:1px solid var(--line)}button:hover{filter:brightness(.98);transform:translateY(-1px)}button:disabled{opacity:.55;cursor:not-allowed;transform:none}.status{margin-top:10px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;color:var(--muted);background:#fffdf8}.status.ok{color:#356346;border-color:#acd0b7;background:#f2fff5}.status.bad{color:var(--danger);border-color:#dfb2ac;background:#fff3f1}.facility-switch,.section-tabs{display:flex;flex-wrap:wrap;gap:8px}.facility-switch{margin-bottom:12px}.facility-switch button.active,.section-tabs button.active{background:var(--accent);color:white}.facility-switch button,.section-tabs button{background:#efe1cc;color:var(--ink);border:1px solid var(--line)}.section-tabs{padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:12px}.summary-line{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}.summary-line h2{margin:0}.muted{color:var(--muted);font-size:13px;line-height:1.65}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{border:1px solid #e5d2b8;border-radius:16px;background:#fffdf8;padding:14px;min-width:0}.card.locked{background:repeating-linear-gradient(135deg,#fffaf2,#fffaf2 12px,#f6ecdd 12px,#f6ecdd 24px)}.card h3{margin:0 0 8px;font-size:17px;overflow-wrap:anywhere}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}.chip{display:inline-flex;border:1px solid #dec9ab;background:#f7ead7;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800}.card dl{display:grid;grid-template-columns:max-content minmax(0,1fr);gap:5px 9px;margin:0;font-size:13px;line-height:1.6}.card dt{font-weight:800;color:#5f4935}.card dd{margin:0;overflow-wrap:anywhere;white-space:pre-wrap}.empty{grid-column:1/-1;padding:26px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px}footer{padding:12px 0 40px;color:var(--muted);font-size:12px;text-align:center}@media(max-width:720px){.unlock-grid{grid-template-columns:1fr 1fr}.unlock-grid .field{grid-column:1/-1}.cards{grid-template-columns:1fr}}@media(max-width:430px){header,main{width:min(100% - 16px,1120px)}.unlock-grid{grid-template-columns:1fr}.unlock-grid button{width:100%}.card dl{grid-template-columns:1fr}.card dd{margin-bottom:5px}}

.branch-controls{display:grid;gap:10px;margin:0 0 12px;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fffdf8}.branch-controls[hidden]{display:none}.branch-search{display:grid;grid-template-columns:minmax(220px,1fr);gap:6px}.branch-search label{font-size:12px;font-weight:800;color:var(--muted)}.weapon-category-tabs{display:flex;flex-wrap:wrap;gap:7px}.weapon-category-tabs button{background:#f1e4d1;color:var(--ink);border:1px solid var(--line);padding:8px 12px}.weapon-category-tabs button.active{background:var(--accent);color:#fff}.weapon-category-tabs .count{font-size:11px;opacity:.78;margin-left:4px}
.branch-groups{display:grid;gap:12px}.branch-group{border:1px solid #dec8a9;border-radius:16px;background:#fffdf8;overflow:hidden}.branch-group>summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:900;display:flex;gap:8px;align-items:center;justify-content:space-between;background:#f6e8d4}.branch-group>summary::-webkit-details-marker{display:none}.branch-group>summary::before{content:"▶";margin-right:7px;transition:transform .15s}.branch-group[open]>summary::before{transform:rotate(90deg)}.branch-summary-main{display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-width:0}.branch-body{padding:13px;display:grid;gap:14px}.branch-line{display:grid;gap:8px;border-left:4px solid #b98956;padding:4px 0 4px 12px}.branch-node{position:relative;border:1px solid #e5d2b8;border-radius:14px;background:#fffaf3;padding:12px;margin-left:calc((var(--depth,1) - 1) * 22px)}.branch-node::before{content:"┗";position:absolute;left:-19px;top:12px;color:#9a7652;font-weight:900}.branch-node.locked{background:repeating-linear-gradient(135deg,#fffaf2,#fffaf2 12px,#f6ecdd 12px,#f6ecdd 24px)}.branch-node h3{margin:0 0 7px;font-size:16px}.performance{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.performance .chip{background:#e7f0e7;border-color:#bdd1bf}.base-weapons{display:grid;gap:8px;margin:0 0 12px}.base-weapon{border:1px solid #c9b18f;border-radius:15px;background:#fffdf8;overflow:hidden}.base-weapon>summary{cursor:pointer;list-style:none;padding:12px 14px;font-weight:900;background:#efe2cf}.base-weapon>summary::-webkit-details-marker{display:none}.base-weapon-body{padding:12px}.base-weapon-body dl{display:grid;grid-template-columns:max-content minmax(0,1fr);gap:5px 9px;margin:0;font-size:13px;line-height:1.6}.base-weapon-body dt{font-weight:800;color:#5f4935}.base-weapon-body dd{margin:0;white-space:pre-wrap;overflow-wrap:anywhere}.branch-node dl{display:grid;grid-template-columns:max-content minmax(0,1fr);gap:5px 9px;margin:0;font-size:13px;line-height:1.6}.branch-node dt{font-weight:800;color:#5f4935}.branch-node dd{margin:0;overflow-wrap:anywhere;white-space:pre-wrap}@media(max-width:520px){.branch-node{margin-left:calc((var(--depth,1) - 1) * 12px)}.branch-node dl{grid-template-columns:1fr}.branch-node dd{margin-bottom:5px}}
.recipe-category-groups{display:grid;gap:12px}.recipe-category-group{border:1px solid #dec8a9;border-radius:16px;background:#fffdf8;overflow:hidden}.recipe-category-group>summary{cursor:pointer;list-style:none;padding:13px 15px;font-weight:900;background:#f6e8d4}.recipe-category-group>summary::-webkit-details-marker{display:none}.recipe-category-body{padding:12px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}@media(max-width:720px){.recipe-category-body{grid-template-columns:1fr}}</style>
</head>
<body>
<header><div class="hero"><div class="build">Version：v90.8.201 / 最終更新日：2026年7月16日</div><h1>施設カタログ</h1><p class="subtitle">鍛冶屋と薬屋の商品・作成・素材加工を確認できます。装備強化はこのページでは扱いません。</p></div></header>
<main>
<section class="panel">
  <div class="unlock-grid">
    <div class="field"><label for="unlockKey">解放キー</label><input id="unlockKey" autocomplete="off" spellcheck="false" placeholder="GMから受け取ったキーを入力"></div>
    <button id="applyKey" type="button">キーを適用</button><button id="resetKey" class="ghost" type="button">初期状態へ戻す</button>
  </div>
  <div id="unlockStatus" class="status">施設データを読み込んでいます。</div>
</section>
<section class="panel">
  <div class="facility-switch"><button data-facility="smith" class="active">鍛冶屋</button><button data-facility="apothecary">薬屋</button></div>
  <div id="sectionTabs" class="section-tabs"></div>
  <div class="summary-line"><div><h2 id="sectionTitle">販売商品</h2><div id="sectionDescription" class="muted"></div></div><button id="reloadDb" class="secondary" type="button">DB再読み込み</button></div>
  <div id="branchControls" class="branch-controls" hidden>
    <div class="branch-search"><label for="branchSearch">名前・素材検索</label><input id="branchSearch" type="search" autocomplete="off" placeholder="派生名・武器名・元武器名・素材名で検索"></div>
    <div id="weaponCategoryTabs" class="weapon-category-tabs"></div>
  </div>
  <div id="cards" class="cards"></div>
</section>
</main><footer>解放判定と未解放データのマスクはGAS側で行います。</footer>
<script>
'use strict';
const DEFAULT_GAS_WEB_APP_URL='https://script.google.com/macros/s/AKfycbyjIIKXTXZGf8RFOt7wQcenYEuVP68ijTU83e6rioqX21EKW075xjDjB5pTucyVcrc/exec';
const STORAGE_KEY='recraft_alchemia.player_facility.unlock_key';
const SECTION_DEFS={
 smith:[['sales','販売商品','鍛冶屋で購入できる品です。'],['craft','装備・道具作成','武器・防具・盾・バッグ・矢筒・装飾品・仕掛けなどの作成です。'],['materials','素材加工','鍛冶で使う中間素材の加工です。'],['branches','武器派生','武器カテゴリ別に7系統ずつ、主素材の分類を象徴する短い名称の「○○派生」を確認できます。草角・樹心・沼核・反照のボス素材派生は全カテゴリに用意されています。未解放中も、現在入手できる素材だけは名称と個数を表示します。']],
 apothecary:[['sales','販売商品','薬屋で購入できる調合品と調合道具です。'],['alchemy','調合品作成','薬品・香・爆弾・瓶などの調合です。'],['materials','素材加工','調合に必要な中間素材の加工です。']]
};
let catalog={smith:{sales:[],craft:[],materials:[],branches:[]},apothecary:{sales:[],alchemy:[],materials:[]}};
let currentFacility='smith',currentSection='sales',currentKey='',currentWeaponCategory='',branchSearch='';
const $=id=>document.getElementById(id);
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function rankLabel(v){return `★${Math.max(1,Math.floor(Number(v)||1))}`;}
function setStatus(text,kind=''){const el=$('unlockStatus');el.className='status'+(kind?' '+kind:'');el.textContent=text;}
function jsonp(key){return new Promise((resolve,reject)=>{const cb='raFacilityCb_'+Date.now()+'_'+Math.random().toString(36).slice(2);const sc=document.createElement('script');const timer=setTimeout(()=>{clean();reject(new Error('通信がタイムアウトしました。'));},20000);function clean(){clearTimeout(timer);try{delete window[cb]}catch(e){}sc.remove();}window[cb]=j=>{clean();resolve(j)};const u=new URL(DEFAULT_GAS_WEB_APP_URL);u.searchParams.set('api','1');u.searchParams.set('action','facilityCatalog');u.searchParams.set('unlockKey',key||'');u.searchParams.set('callback',cb);sc.onerror=()=>{clean();reject(new Error('施設DBへ接続できませんでした。'));};sc.src=u.toString();document.head.appendChild(sc);});}
function performanceHtml(rows){return Array.isArray(rows)&&rows.length?`<div class="performance">${rows.map(x=>`<span class="chip">${esc(x.label)} ${esc(x.value)}</span>`).join('')}</div>`:'';}
function itemTextRows(r){return [['説明',r.description],['効果',r.effect]].filter(x=>String(x[1]||'').trim());}
function itemCard(r){const chips=[rankLabel(r.rank),r.itemType||r.dataKind||'',r.itemCategory||r.materialCategory||'',r.equipSlot?`枠:${r.equipSlot}`:''].filter(Boolean);const rows=[['価格',String(r.price||'')?`${r.price}G`:'未設定'],...itemTextRows(r)];return `<article class="card"><h3>${esc(r.name)}</h3><div class="chips">${chips.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>${performanceHtml(r.performance)}<dl>${rows.map(([k,v])=>`<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join('')}</dl></article>`;}
function recipeCard(r){const chips=[rankLabel(r.rank),r.craftType,r.category,r.itemType,r.itemCategory].filter(Boolean);const pairs=[];if(r.baseItem)pairs.push(['派生元',r.baseItem]);pairs.push(['必要素材',r.requiredMaterials||'未設定']);if(String(r.resultCount||''))pairs.push(['完成数',r.resultCount]);if(String(r.price||''))pairs.push(['施設依頼',`${r.price}G`]);if(!r.locked&&r.difficulty)pairs.push(['作成難易度',r.difficulty]);if(!r.locked&&r.description)pairs.push(['説明',r.description]);if(r.effect)pairs.push(['効果',r.effect]);return `<article class="card ${r.locked?'locked':''}"><h3>${esc(r.resultItem||r.name||'名称未設定')}</h3><div class="chips">${chips.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>${!r.locked?performanceHtml(r.performance):''}<dl>${pairs.map(([k,v])=>`<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join('')}</dl></article>`;}

function recipeCategoryLabel(r){
  const type=String(r.itemType||'').trim(), cat=String(r.itemCategory||r.category||'').trim();
  if(type==='武器'||type==='術式装備')return '武器・術式装備';
  if(type==='防具'||type==='盾')return '防具・盾';
  if(type==='装飾品')return '装飾品';
  if(type==='バッグ'||type==='矢筒')return 'バッグ・矢筒';
  if(type==='道具')return '道具・仕掛け';
  if(type==='調合品')return cat||'調合品';
  if(String(r.craftType||'')==='素材加工')return cat||'素材加工';
  return cat||type||'その他';
}
function recipeCatalog(rows){
  const groups=new Map();
  rows.forEach(r=>{const key=recipeCategoryLabel(r);if(!groups.has(key))groups.set(key,[]);groups.get(key).push(r);});
  return `<div class="recipe-category-groups">${[...groups.entries()].map(([label,list],idx)=>`<details class="recipe-category-group" ${idx===0?'open':''}><summary>${esc(label)}（${list.length}）</summary><div class="recipe-category-body">${list.map(recipeCard).join('')}</div></details>`).join('')}</div>`;
}
function branchNode(n){const pairs=[['必要素材',n.requiredMaterials||'未設定']];if(String(n.price||''))pairs.push(['施設依頼',`${n.price}G`]);if(!n.locked){if(n.difficulty)pairs.push(['作成難易度',n.difficulty]);if(n.description)pairs.push(['説明',n.description]);if(n.effect)pairs.push(['効果',n.effect]);}else{pairs.push(['効果','？？？']);}return `<article class="branch-node ${n.locked?'locked':''}" style="--depth:${Math.max(1,Number(n.depth)||1)}"><h3>${esc(n.resultItem||'？？？')}</h3><div class="chips"><span class="chip">${esc(rankLabel(n.rank))}</span>${n.locked?'<span class="chip">未解放</span>':''}</div>${!n.locked?performanceHtml(n.performance):''}<dl>${pairs.map(([k,v])=>`<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join('')}</dl></article>`;}
function baseWeaponCard(w){const rows=itemTextRows(w);return `<details class="base-weapon"><summary>初期武器：${esc(w.name||'名称未設定')}（${esc(rankLabel(w.rank))}）</summary><div class="base-weapon-body"><div class="chips">${[w.itemCategory,w.equipSlot?`枠:${w.equipSlot}`:''].filter(Boolean).map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>${performanceHtml(w.performance)}<dl>${rows.map(([k,v])=>`<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join('')}</dl></div></details>`;}
function searchNorm(v){return String(v||'').normalize('NFKC').toLocaleLowerCase('ja').replace(/\s+/g,'');}
function branchSearchText(branch){const parts=[branch.label];(branch.lines||[]).forEach(line=>(line.nodes||[]).forEach(n=>{parts.push(n.resultItem,n.requiredMaterials);}));return searchNorm(parts.filter(Boolean).join(' '));}
function branchMatches(branch,query){return !query||branchSearchText(branch).includes(query);}
function branchCatalog(categories){
  if(!categories.length){$('weaponCategoryTabs').innerHTML='';return '<div class="empty">武器派生は登録されていません。</div>';}
  const query=searchNorm(branchSearch);
  const available=categories.map(cat=>({...cat,matched:(cat.branches||[]).filter(b=>branchMatches(b,query))})).filter(cat=>cat.matched.length);
  if(!available.length){$('weaponCategoryTabs').innerHTML='';return '<div class="empty">検索条件に一致する武器派生はありません。</div>';}
  if(!available.some(cat=>cat.category===currentWeaponCategory))currentWeaponCategory=available[0].category;
  $('weaponCategoryTabs').innerHTML=available.map(cat=>`<button type="button" data-weapon-category="${esc(cat.category)}" class="${cat.category===currentWeaponCategory?'active':''}">${esc(cat.category)}<span class="count">${cat.matched.length}</span></button>`).join('');
  const current=available.find(cat=>cat.category===currentWeaponCategory)||available[0];
  const bases=(current.baseWeapons||[]).length?`<div class="base-weapons">${current.baseWeapons.map(baseWeaponCard).join('')}</div>`:'';
  return bases+`<div class="branch-groups">${current.matched.map((branch,idx)=>`<details class="branch-group" ${idx===0?'open':''}><summary><span class="branch-summary-main"><span>${esc(branch.label||'？？？')}派生</span></span><span class="muted">${(branch.lines||[]).reduce((sum,line)=>sum+(line.nodes||[]).length,0)}段階</span></summary><div class="branch-body">${(branch.lines||[]).map(line=>`<div class="branch-line">${(line.nodes||[]).map(branchNode).join('')}</div>`).join('')}</div></details>`).join('')}</div>`;
}
function renderTabs(){const defs=SECTION_DEFS[currentFacility];if(!defs.some(d=>d[0]===currentSection))currentSection=defs[0][0];$('sectionTabs').innerHTML=defs.map(([id,label])=>`<button data-section="${esc(id)}" class="${id===currentSection?'active':''}">${esc(label)}</button>`).join('');const cur=defs.find(d=>d[0]===currentSection);$('sectionTitle').textContent=cur[1];$('sectionDescription').textContent=cur[2];}
function render(){renderTabs();const rows=(catalog[currentFacility]&&catalog[currentFacility][currentSection])||[];const branches=currentSection==='branches';$('branchControls').hidden=!branches;$('cards').className=branches?'':'cards';$('cards').innerHTML=branches?branchCatalog(rows):(rows.length?(currentSection==='sales'?rows.map(itemCard).join(''):recipeCatalog(rows)):'<div class="empty">現在の解放範囲で表示できる内容はありません。</div>');}
async function loadCatalog(key,save){setStatus('施設DBからデータを読み込んでいます。');$('applyKey').disabled=true;$('reloadDb').disabled=true;try{const j=await jsonp(key);if(!j||!j.ok)throw new Error(j&&j.error?j.error:'施設データを取得できませんでした。');catalog=j.catalog||catalog;currentKey=key||'';if(save){if(currentKey)localStorage.setItem(STORAGE_KEY,currentKey);else localStorage.removeItem(STORAGE_KEY);}setStatus(`現在の解放範囲：${j.areaName||'初期エリア'}まで`,'ok');render();return true;}catch(e){setStatus(String(e.message||e),'bad');return false;}finally{$('applyKey').disabled=false;$('reloadDb').disabled=false;}}
$('applyKey').addEventListener('click',()=>loadCatalog($('unlockKey').value.trim(),true));
$('unlockKey').addEventListener('keydown',e=>{if(e.key==='Enter')loadCatalog($('unlockKey').value.trim(),true);});
$('resetKey').addEventListener('click',()=>{$('unlockKey').value='';loadCatalog('',true);});
$('reloadDb').addEventListener('click',()=>loadCatalog(currentKey,false));
document.addEventListener('click',e=>{const f=e.target.closest('[data-facility]');if(f){currentFacility=f.dataset.facility;currentSection=SECTION_DEFS[currentFacility][0][0];currentWeaponCategory='';document.querySelectorAll('[data-facility]').forEach(b=>b.classList.toggle('active',b===f));render();return;}const s=e.target.closest('[data-section]');if(s){currentSection=s.dataset.section;if(currentSection==='branches')currentWeaponCategory='';render();return;}const c=e.target.closest('[data-weapon-category]');if(c){currentWeaponCategory=c.dataset.weaponCategory||'';render();}});
$('branchSearch').addEventListener('input',e=>{branchSearch=e.target.value||'';render();});
const saved=localStorage.getItem(STORAGE_KEY)||'';$('unlockKey').value=saved;loadCatalog(saved,false).then(ok=>{if(!ok&&saved){$('unlockKey').value='';localStorage.removeItem(STORAGE_KEY);loadCatalog('',false);}});
</script>
</body></html>
